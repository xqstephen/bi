# 线上配置文件
server:
  port: 8101
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/bi_project
    username: root
    password: ${DB_PASSWORD}
  # Redis 配置
  redis:
    database: 1
    host: 127.0.0.1
    port: 6379
    timeout: 5000
    password: ${REDIS_PASSWORD}
  rabbitmq:
    username: ${RABBITMQ_ADMIN}
    password: ${RABBITMQ_PASSWORD}
    host: 127.0.0.1
    port: 5672
    listener:
      simple:
        acknowledge-mode: manual
mybatis-plus:
  configuration:
    # 生产环境关闭日志
    log-impl: ''
tencent:
  deepseek:
    client:
      secret-id: ${TECENT_DP_SECRET_ID}
      secret-key: ${TECENT_DP_SECRET_KEY}

